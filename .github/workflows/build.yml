name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri
        run: cd src-tauri && cargo build --release

      - name: List output files
        run: ls -la src-tauri/target/release/jmcomic-downloader

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: jmcomic-downloader
          path: src-tauri/target/release/jmcomic-downloader
