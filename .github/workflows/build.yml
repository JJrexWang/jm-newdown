name: Build and Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev curl build-essential pkg-config
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install frontend deps
        run: pnpm install
      
      - name: Build frontend
        run: pnpm build
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build Tauri
        run: |
          cd src-tauri
          cargo build --release 2>&1 | tail -50
      
      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v0.1.0
          release_name: v0.1.0
          draft: true
          prerelease: false
      
      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: src-tauri/target/release/jmcomic-downloader
          asset_name: jmcomic-downloader-linux
          asset_content_type: application/octet-stream
