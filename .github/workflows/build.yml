name: Build and Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev curl build-essential pkg-config
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install frontend deps
        run: pnpm install
      
      - name: Build frontend
        run: pnpm build
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build Tauri
        run: |
          cd src-tauri
          cargo build --release 2>&1 | tail -50
      
      - name: Create tarball
        run: |
          cd src-tauri/target/release
          tar -czf jmcomic-downloader.tar.gz jmcomic-downloader
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/jmcomic-downloader.tar.gz
          name: v0.1.0
          body: '首次发布 - 禁漫下载器\n\n包含优化：下载整个收藏夹支持并发获取'
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
